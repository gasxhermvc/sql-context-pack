name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --user ".[dev]"
      - run: python -m ruff format --check .
      - run: python -m ruff check .
      - run: python -m mypy
      - run: python scripts/validate_manifests.py
      - run: python scripts/generate_contract_schemas.py
      - run: git diff --exit-code -- docs/generated

  unit-contract:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --user ".[dev]"
      - run: python -m pytest tests/unit tests/contract

  integration-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --user ".[dev]"
      - run: python -m pytest tests/integration tests/e2e
      - run: python -m build --no-isolation

  harness-simulators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --user ".[dev]"
      - run: python -m pytest tests/harness
      - run: python -m pytest tests/contract/test_interface_contracts.py tests/contract/test_documentation_and_environment_policy.py
