name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --user ".[dev]"
      - run: pwsh -NoProfile -File scripts/dev-check.ps1 -Task format
      - run: pwsh -NoProfile -File scripts/dev-check.ps1 -Task lint
      - run: pwsh -NoProfile -File scripts/dev-check.ps1 -Task typecheck
      - run: python scripts/validate_manifests.py
      - run: python scripts/generate_contract_schemas.py
      - run: git diff --exit-code -- docs/generated

  unit-contract:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --user ".[dev]"
      - run: pwsh -NoProfile -File scripts/dev-check.ps1 -Task clean
      - run: python -m pytest -p no:cacheprovider --basetemp="${{ runner.temp }}/pytest" tests/unit tests/contract

  integration-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --user ".[dev]"
      - run: pwsh -NoProfile -File scripts/dev-check.ps1 -Task clean
      - run: python -m pytest -p no:cacheprovider --basetemp="${{ runner.temp }}/pytest" tests/integration tests/e2e
      - run: pwsh -NoProfile -File scripts/dev-check.ps1 -Task build

  harness-simulators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --user ".[dev]"
      - run: pwsh -NoProfile -File scripts/dev-check.ps1 -Task clean
      - run: python -m pytest -p no:cacheprovider --basetemp="${{ runner.temp }}/pytest-harness" tests/harness
      - run: python -m pytest -p no:cacheprovider --basetemp="${{ runner.temp }}/pytest-contract" tests/contract/test_interface_contracts.py tests/contract/test_documentation_and_environment_policy.py
